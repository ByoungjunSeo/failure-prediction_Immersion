---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: registry-gc
  namespace: failure-prediction
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: registry-gc
  namespace: failure-prediction
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: registry-gc
  namespace: failure-prediction
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: registry-gc
subjects:
- kind: ServiceAccount
  name: registry-gc
  namespace: failure-prediction
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc
  namespace: failure-prediction
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: registry-gc
          restartPolicy: OnFailure
          containers:
          - name: gc
            image: 10.100.230.6:5000/failure-pred:cpu-latest
            imagePullPolicy: IfNotPresent
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
            command: ["bash", "-euo", "pipefail", "-c"]
            args:
            - |
              # kubectl 부트스트랩
              if ! command -v kubectl >/dev/null 2>&1; then
                curl -sSL -o /usr/local/bin/kubectl \
                  https://dl.k8s.io/release/v1.27.10/bin/linux/amd64/kubectl
                chmod +x /usr/local/bin/kubectl
              fi

              REG_POD=registry
              NS=failure-prediction

              echo "=== before ==="
              kubectl exec -n "$NS" "$REG_POD" -- du -sh /var/lib/registry || true
              kubectl exec -n "$NS" "$REG_POD" -- df -h /var/lib/registry || true

              echo "=== dry-run summary ==="
              kubectl exec -n "$NS" "$REG_POD" -- registry garbage-collect \
                --dry-run --delete-untagged \
                /etc/docker/registry/config.yml 2>&1 | tail -30 || true

              echo "=== applying GC ==="
              kubectl exec -n "$NS" "$REG_POD" -- registry garbage-collect \
                --delete-untagged \
                /etc/docker/registry/config.yml 2>&1 | tail -10

              echo "=== after ==="
              kubectl exec -n "$NS" "$REG_POD" -- du -sh /var/lib/registry || true
              kubectl exec -n "$NS" "$REG_POD" -- df -h /var/lib/registry || true

              echo "GC 완료"
