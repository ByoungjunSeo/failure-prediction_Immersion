apiVersion: apps/v1
kind: Deployment
metadata:
  name: npu-embed
  namespace: failure-prediction
  labels: {app: npu-embed}
spec:
  replicas: 1
  strategy: {type: Recreate}     # NPU 1대 — 동시 2 pod 불가
  selector:
    matchLabels: {app: npu-embed}
  template:
    metadata:
      labels: {app: npu-embed}
    spec:
      nodeSelector:
        furiosa.ai/npu.family: rngd
      securityContext:
        seccompProfile:
          type: Unconfined        # RNGD 드라이버가 io_uring 호출 → 기본 seccomp 차단됨
      containers:
      - name: serve
        image: 10.100.230.130:5000/failure-pred:npu-latest
        imagePullPolicy: Always
        command: ["/bin/bash", "-c"]
        args:
        - |
          ARTIFACT_DIR="${ARTIFACT_DIR:-/artifacts/qwen3-embed-4b}"
          if [ ! -d "$ARTIFACT_DIR" ] || [ -z "$(ls -A "$ARTIFACT_DIR" 2>/dev/null)" ]; then
            echo "[entrypoint] artifact missing — building"
            python /app/build_npu_artifact.py --model "$MODEL_ID" --save-dir "$ARTIFACT_DIR"
          fi
          echo "[entrypoint] starting furiosa-llm serve (devices=npu0)"
          exec furiosa-llm serve "$ARTIFACT_DIR" --host 0.0.0.0 --port 8000 --devices "npu:0:*"
        ports:
        - {containerPort: 8000, name: openai-api}
        env:
        - {name: ARTIFACT_DIR, value: /artifacts/qwen3-embed-4b}
        - {name: MODEL_ID,     value: Qwen/Qwen3-Embedding-4B}
        resources:
          limits:
            cpu: "16"
            memory: 32Gi
            furiosa.ai/rngd: "1"
          requests:
            cpu: "4"
            memory: 16Gi
            furiosa.ai/rngd: "1"
        readinessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 5
        volumeMounts:
        - name: artifacts
          mountPath: /artifacts
      volumes:
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-npu-artifacts
---
apiVersion: v1
kind: Service
metadata:
  name: npu-embed-svc
  namespace: failure-prediction
spec:
  selector: {app: npu-embed}
  ports:
  - {port: 8000, targetPort: 8000, name: openai-api}
