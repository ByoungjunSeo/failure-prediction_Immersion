##
## PUE Data Exporter — NodePort 31620
##
apiVersion: v1
kind: Service
metadata:
  name: pue-data-exporter-svc
  namespace: failure-prediction
  labels:
    app: pue-data-exporter
spec:
  type: NodePort
  selector:
    app: pue-data-exporter
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 31620
      name: http
