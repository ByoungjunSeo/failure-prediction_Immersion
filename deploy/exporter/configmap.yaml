##
## PUE Data Exporter — 설정(소스 URL 등). 코드는 별도 ConfigMap(아래 deployment 주석 참고).
##
apiVersion: v1
kind: ConfigMap
metadata:
  name: pue-data-exporter-config
  namespace: failure-prediction
  labels:
    app: pue-data-exporter
data:
  PROMETHEUS_URL: "http://monitoring-kube-prometheus-prometheus.monitoring:9090"
  VM_URL: "http://victoria-metrics-svc:8428"
  PORT: "8080"
  QUERY_TIMEOUT: "120"
