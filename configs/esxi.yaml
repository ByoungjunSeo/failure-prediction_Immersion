# vCenter 미사용 — ESXi 직접 접근
# vmgnode17 (10.148.148.117): 접속 장애로 제외
esxi_hosts:
  - id: vmgnode18
    ip: 10.148.148.118
    bmc_ip: 172.31.201.118
    username: root
    password: ${ESXI_PASSWORD}

  - id: vmgnode23
    ip: 10.148.148.123
    bmc_ip: 172.31.201.123
    username: root
    password: ${ESXI_PASSWORD}

  - id: vmgnode26
    ip: 10.148.148.126
    bmc_ip: 172.31.201.126
    username: root
    password: ${ESXI_PASSWORD}

  - id: vmgnode30
    ip: 10.148.148.130
    bmc_ip: 172.31.201.130
    username: root
    password: ${ESXI_PASSWORD}

collection:
  interval_seconds: 60
  timeout_seconds: 10
  retry_count: 3
  ssh_key_path: ~/.ssh/id_ed25519
